services:
  postgres:
    image: postgres:15-alpine
    container_name: atala-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d ecommerce_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
